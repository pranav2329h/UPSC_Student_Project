<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="72" height="72" rx="18" fill="url(#grad)" />
  <!-- Brain circuit paths -->
  <circle cx="40" cy="32" r="8" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
  <!-- Nodes -->
  <circle cx="40" cy="32" r="3" fill="white"/>
  <circle cx="20" cy="52" r="3" fill="white"/>
  <circle cx="60" cy="52" r="3" fill="white"/>
  <circle cx="40" cy="58" r="3" fill="white"/>
  <!-- Connection lines -->
  <line x1="40" y1="40" x2="20" y2="52" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="40" y1="40" x2="60" y2="52" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="40" y1="40" x2="40" y2="55" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="20" y1="52" x2="40" y2="58" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="52" x2="40" y2="58" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Sparkle -->
  <line x1="55" y1="20" x2="55" y2="28" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="51" y1="24" x2="59" y2="24" stroke="white" stroke-width="2" opacity="0.7"/>
</svg>
